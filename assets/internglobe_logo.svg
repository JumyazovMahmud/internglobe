<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565C0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#42A5F5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="globeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E3F2FD;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="briefcaseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD54F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA000;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#1565C0" flood-opacity="0.35"/>
    </filter>
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <clipPath id="circleClip">
      <circle cx="200" cy="185" r="105"/>
    </clipPath>
  </defs>

  <!-- Background rounded square -->
  <rect width="400" height="400" rx="90" ry="90" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Subtle inner shine top -->
  <ellipse cx="200" cy="60" rx="130" ry="45" fill="white" opacity="0.08"/>

  <!-- Globe body -->
  <circle cx="200" cy="185" r="105" fill="url(#globeGrad)" opacity="0.97"/>

  <!-- Globe latitude lines -->
  <g clip-path="url(#circleClip)" fill="none" stroke="#90CAF9" stroke-width="1.5" opacity="0.6">
    <ellipse cx="200" cy="185" rx="105" ry="30"/>
    <ellipse cx="200" cy="185" rx="105" ry="65"/>
    <ellipse cx="200" cy="185" rx="105" ry="95"/>
  </g>

  <!-- Globe longitude lines -->
  <g clip-path="url(#circleClip)" fill="none" stroke="#90CAF9" stroke-width="1.5" opacity="0.6">
    <line x1="200" y1="80" x2="200" y2="290"/>
    <ellipse cx="200" cy="185" rx="52" ry="105"/>
    <ellipse cx="200" cy="185" rx="90" ry="105"/>
  </g>

  <!-- Globe outline -->
  <circle cx="200" cy="185" r="105" fill="none" stroke="#1976D2" stroke-width="2.5" opacity="0.3"/>

  <!-- Briefcase / bag icon centered on globe -->
  <g transform="translate(200, 185)">
    <!-- Briefcase body -->
    <rect x="-32" y="-18" width="64" height="44" rx="7" ry="7" fill="url(#briefcaseGrad)" filter="url(#innerGlow)"/>
    <!-- Briefcase handle -->
    <path d="M -16 -18 L -16 -28 Q -16 -36 -8 -36 L 8 -36 Q 16 -36 16 -28 L 16 -18"
          fill="none" stroke="#FFA000" stroke-width="5" stroke-linecap="round"/>
    <!-- Briefcase middle bar -->
    <rect x="-32" y="-4" width="64" height="5" rx="2" fill="#E65100" opacity="0.25"/>
    <!-- Briefcase clasp -->
    <rect x="-6" y="-6" width="12" height="9" rx="3" fill="#FFB300"/>
    <rect x="-3" y="-3" width="6" height="3" rx="1.5" fill="#E65100" opacity="0.4"/>
  </g>

  <!-- Subtle orbit ring around globe -->
  <ellipse cx="200" cy="185" rx="128" ry="28" fill="none"
           stroke="white" stroke-width="2" stroke-dasharray="8 6" opacity="0.25"
           transform="rotate(-20, 200, 185)"/>

  <!-- Small location pin top-right of globe -->
  <g transform="translate(278, 108)">
    <circle cx="0" cy="-6" r="10" fill="#FF5252"/>
    <path d="M 0 4 L -7 -4 Q -10 -10 -10 -14 A 10 10 0 1 1 10 -14 Q 10 -10 7 -4 Z" fill="#FF5252"/>
    <circle cx="0" cy="-14" r="4" fill="white" opacity="0.8"/>
  </g>

</svg>
